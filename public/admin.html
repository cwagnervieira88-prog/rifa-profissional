<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - RifaPro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .card h2 { margin-bottom: 20px; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: 600; display: block; margin-bottom: 5px; color: #333; }
        input, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-right: 10px;
        }
        .btn-success { background: #48bb78; }
        .btn-danger { background: #f56565; }
        .btn-warning { background: #f59e0b; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(450px, 1fr)); gap: 20px; }
        .rifa-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            border: 1px solid #ddd;
        }
        .rifa-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        .rifa-info { padding: 15px; }
        .numeros-vendidos {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            font-size: 13px;
            max-height: 250px;
            overflow-y: auto;
        }
        .numero-item {
            display: inline-block;
            margin: 5px;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            text-align: center;
            min-width: 90px;
        }
        .numero-reservado {
            background: #f59e0b;
            color: white;
        }
        .numero-pago {
            background: #48bb78;
            color: white;
        }
        .btn-confirmar {
            background: #38a169;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 15px;
            font-size: 10px;
            cursor: pointer;
            margin-top: 5px;
            margin-right: 0;
        }
        .btn-confirmar:hover { background: #2f855a; }
        .link-compartilhar {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 10px;
            font-size: 12px;
            word-break: break-all;
            margin-top: 10px;
        }
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
        }
        .detalhe-venda {
            font-size: 10px;
            margin-top: 3px;
            color: rgba(255,255,255,0.9);
        }
        .titulo-rifa {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status-badge {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            background: #e2e8f0;
            color: #4a5568;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div id="loginScreen" class="login-container" style="display: none;">
        <h2>🔐 Acesso Administrativo</h2>
        <input type="password" id="senhaAdmin" placeholder="Digite a senha">
        <button onclick="verificarSenha()">Entrar</button>
        <p style="margin-top: 10px; color: red; font-size: 12px;" id="erroSenha"></p>
    </div>

    <div id="adminPanel" style="display: none;">
        <div class="card">
            <h2>📱 Criar Nova Rifa</h2>
            <div class="form-group">
                <label>🏷️ Nome da Rifa</label>
                <input type="text" id="nomeRifa" placeholder="Ex: Rifa iPhone 15">
            </div>
            <div class="form-group">
                <label>📷 URL da Foto</label>
                <input type="text" id="fotoRifa" placeholder="https://exemplo.com/foto.jpg">
            </div>
            <div class="form-group">
                <label>🔢 Quantidade de Números</label>
                <input type="number" id="qtdNumeros" value="100">
            </div>
            <div class="form-group">
                <label>💰 Valor por Bilhete (R$)</label>
                <input type="number" id="valorBilhete" step="0.01" value="10.00">
            </div>
            <div class="form-group">
                <label>📝 Descrição</label>
                <textarea id="descricao" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>💳 Chave PIX</label>
                <input type="text" id="chavePix" placeholder="Email, CPF ou telefone">
            </div>
            <button onclick="criarRifa()">✅ Criar Rifa</button>
            <button onclick="limparForm()" class="btn-danger">🗑️ Limpar</button>
        </div>

        <div class="card">
            <h2>🎯 Suas Rifas</h2>
            <div id="rifasList" class="grid">
                <div class="loading">Carregando rifas...</div>
            </div>
        </div>
    </div>
</div>

<script>
    const SENHA_ADMIN = "admin123";

    function verificarSenha() {
        const senha = document.getElementById('senhaAdmin').value;
        if (senha === SENHA_ADMIN) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            carregarRifas();
            setInterval(carregarRifas, 15000);
        } else {
            document.getElementById('erroSenha').innerText = 'Senha incorreta!';
        }
    }

    async function carregarRifas() {
        try {
            const response = await fetch('/api/rifas');
            const rifas = await response.json();
            const container = document.getElementById('rifasList');
            
            if (rifas.length === 0) {
                container.innerHTML = '<p style="grid-column:1/-1; text-align:center;">Nenhuma rifa criada ainda.</p>';
                return;
            }
            
            // Processar cada rifa
            let html = '';
            for (const rifa of rifas) {
                try {
                    const vendidosRes = await fetch(`/api/numeros-vendidos/${rifa.id}`);
                    const vendidos = await vendidosRes.json();
                    
                    const pagos = vendidos.filter(v => v.status === 'pago').length;
                    const reservados = vendidos.filter(v => v.status === 'reservado').length;
                    
                    html += `
                        <div class="rifa-card">
                            <img src="${rifa.foto || 'https://via.placeholder.com/450x180?text=Rifa'}" alt="${rifa.nome}">
                            <div class="rifa-info">
                                <div class="titulo-rifa">
                                    <h3>🎯 ${escapeHtml(rifa.nome)}</h3>
                                    <span class="status-badge">💰 R$ ${rifa.valor_bilhete.toFixed(2)}</span>
                                </div>
                                <p>${escapeHtml(rifa.descricao || 'Sem descrição')}</p>
                                <p>🎫 Vendidos: ${pagos + reservados} / ${rifa.quantidade_numeros}  |  ✅ Pagos: ${pagos}  |  🟠 Reservados: ${reservados}</p>
                                
                                <div class="numeros-vendidos">
                                    <strong>📋 Números:</strong><br>
                                    ${vendidos.length === 0 ? 'Nenhum número vendido ainda' : 
                                        vendidos.map(v => `
                                            <div class="numero-item ${v.status === 'pago' ? 'numero-pago' : 'numero-reservado'}">
                                                #${v.numero}
                                                <div class="detalhe-venda">
                                                    ${escapeHtml(v.nome_cliente)}<br>
                                                    ${escapeHtml(v.telefone)}
                                                </div>
                                                ${v.status === 'reservado' ? 
                                                    `<button class="btn-confirmar" onclick="confirmarPagamento(${rifa.id}, ${v.numero})">✅ Confirmar PAGO</button>` : 
                                                    '<span style="font-size:10px;">✅ PAGO</span>'}
                                            </div>
                                        `).join('')}
                                </div>
                                
                                <div class="link-compartilhar">
                                    🔗 Link para o cliente:<br>
                                    <input type="text" value="${window.location.origin}/?rifa=${rifa.id}" readonly onclick="this.select()" style="width:100%; font-size:11px;">
                                    <button onclick="copiarLink('${window.location.origin}/?rifa=${rifa.id}')" style="margin-top:8px; padding:6px 12px; font-size:12px;">📋 Copiar Link</button>
                                </div>
                            </div>
                        </div>
                    `;
                } catch (err) {
                    console.error('Erro ao processar rifa:', err);
                    html += `<div class="rifa-card"><div class="rifa-info">Erro ao carregar rifa ${escapeHtml(rifa.nome)}</div></div>`;
                }
            }
            container.innerHTML = html;
        } catch (error) {
            console.error('Erro ao carregar rifas:', error);
            document.getElementById('rifasList').innerHTML = '<p style="color:red; text-align:center;">Erro ao carregar rifas. Verifique se o servidor está rodando.</p>';
        }
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    async function confirmarPagamento(rifaId, numero) {
        if (!confirm(`Confirmar pagamento do número ${numero}?`)) return;
        
        try {
            const response = await fetch('/api/confirmar-pagamento', {
                method: 'POST',
                headers: { 'Content-Type':application/json' },
                body: JSON.stringify({ rifa_id: rifaId, numero: numero })
            });
            
            if (response.ok) {
                alert('✅ Pagamento confirmado! Número marcado como PAGO.');
                carregarRifas();
            } else {
                const erro = await response.json();
                alert('❌ Erro: ' + erro.error);
            }
        } catch (error) {
            console.error('Erro ao confirmar pagamento:', error);
            alert('❌ Erro ao confirmar pagamento');
        }
    }

    async function criarRifa() {
        const dados = {
            nome: document.getElementById('nomeRifa').value.trim(),
            foto: document.getElementById('fotoRifa').value.trim(),
            quantidade_numeros: parseInt(document.getElementById('qtdNumeros').value),
            valor_bilhete: parseFloat(document.getElementById('valorBilhete').value),
            descricao: document.getElementById('descricao').value.trim(),
            chave_pix: document.getElementById('chavePix').value.trim()
        };
        
        if (!dados.nome) {
            alert('❌ Preencha o nome da rifa');
            return;
        }
        if (!dados.chave_pix) {
            alert('❌ Preencha a chave PIX');
            return;
        }
        
        const btn = event.target;
        const originalText = btn.innerText;
        btn.disabled = true;
        btn.innerText = '⏳ Criando...';
        
        try {
            const response = await fetch('/api/rifas', {
                method: 'POST',
                headers: { 'Content-Type':'application/json' },
                body: JSON.stringify(dados)
            });
            
            if (response.ok) {
                alert('✅ Rifa criada com sucesso!');
                limparForm();
                carregarRifas();
            } else {
                const erro = await response.json();
                alert('❌ Erro: ' + (erro.error || 'Erro desconhecido'));
            }
        } catch (error) {
            console.error('Erro:', error);
            alert('❌ Erro de conexão com o servidor');
        } finally {
            btn.disabled = false;
            btn.innerText = originalText;
        }
    }

    function limparForm() {
        document.getElementById('nomeRifa').value = '';
        document.getElementById('fotoRifa').value = '';
        document.getElementById('qtdNumeros').value = '100';
        document.getElementById('valorBilhete').value = '10.00';
        document.getElementById('descricao').value = '';
        document.getElementById('chavePix').value = '';
    }

    function copiarLink(link) {
        navigator.clipboard.writeText(link);
        alert('✅ Link copiado!');
    }

    document.getElementById('loginScreen').style.display = 'block';
</script>
</body>
</html>
