<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RifaPro - Compre sua Rifa</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 2rem; }
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .rifa-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .rifa-card:hover { transform: translateY(-5px); }
        .rifa-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .rifa-info { padding: 15px; }
        .rifa-info h3 { margin-bottom: 10px; }
        .preco { font-size: 1.3rem; color: #48bb78; font-weight: bold; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 90%;
            overflow-y: auto;
        }
        .numero-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        .numero-item {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .btn-success { background: #48bb78; }
        .btn-mp { background: #009ee3; }
        .close-modal {
            float: right;
            font-size: 28px;
            cursor: pointer;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { font-weight: 600; display: block; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎟️ Escolha sua Rifa</h1>
        <p>Clique na rifa desejada e garanta seus números</p>
    </div>

    <div class="card">
        <div id="rifasList" class="grid">
            <p style="text-align: center; grid-column: 1/-1;">Carregando rifas...</p>
        </div>
    </div>
</div>

<!-- Modal de Compra -->
<div id="modalCompra" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="fecharModal()">&times;</span>
        <h2 id="modalTitulo"></h2>
        <p id="modalDescricao" style="color: #666; margin-bottom: 15px;"></p>
        <div class="form-group">
            <label>🎫 Quantos números deseja?</label>
            <input type="number" id="qtdCompra" min="1" value="1">
            <button onclick="gerarNumerosAleatorios()">🎲 Gerar Números</button>
        </div>
        <div id="numerosContainer" class="numero-grid"></div>
        <div class="form-group">
            <label>👤 Nome completo</label>
            <input type="text" id="clienteNome" placeholder="Digite seu nome">
        </div>
        <div class="form-group">
            <label>📧 E-mail</label>
            <input type="email" id="clienteEmail" placeholder="Digite seu e-mail">
        </div>
        <div class="form-group">
            <label>📱 Telefone (WhatsApp)</label>
            <input type="tel" id="clienteTelefone" placeholder="(11) 99999-9999">
        </div>
        <button id="btnPagar" class="btn-mp" style="display: none;" onclick="pagarComMercadoPago()">💳 Pagar com Mercado Pago</button>
        <div id="msgCompra" style="margin-top: 15px;"></div>
    </div>
</div>

<script>
    let rifaAtual = null;
    let numerosGerados = [];
    let preferenciaId = null;

    function carregarRifas() {
        fetch('/api/rifas')
            .then(res => res.json())
            .then(rifas => {
                const container = document.getElementById('rifasList');
                if (rifas.length === 0) {
                    container.innerHTML = '<p style="text-align: center; grid-column: 1/-1;">Nenhuma rifa disponível no momento.</p>';
                    return;
                }
                container.innerHTML = rifas.map(rifa => `
                    <div class="rifa-card" onclick="abrirCompra(${rifa.id})">
                        <img src="${rifa.foto || 'https://via.placeholder.com/300x200?text=Rifa'}" alt="${rifa.nome}">
                        <div class="rifa-info">
                            <h3>${rifa.nome}</h3>
                            <p>${rifa.descricao || ''}</p>
                            <p class="preco">R$ ${rifa.valor_bilhete.toFixed(2)}</p>
                            <p>🎫 Disponíveis: ${rifa.quantidade_numeros - (rifa.numeros_vendidos || 0)}</p>
                        </div>
                    </div>
                `).join('');
            });
    }

    function abrirCompra(id) {
        fetch(`/api/rifas/${id}`)
            .then(res => res.json())
            .then(rifa => {
                rifaAtual = rifa;
                document.getElementById('modalTitulo').innerHTML = rifa.nome;
                document.getElementById('modalDescricao').innerHTML = rifa.descricao || '';
                document.getElementById('modalCompra').style.display = 'flex';
                document.getElementById('numerosContainer').innerHTML = '';
                document.getElementById('msgCompra').innerHTML = '';
                document.getElementById('btnPagar').style.display = 'none';
                document.getElementById('clienteNome').value = '';
                document.getElementById('clienteEmail').value = '';
                document.getElementById('clienteTelefone').value = '';
                document.getElementById('qtdCompra').value = '1';
                numerosGerados = [];
                preferenciaId = null;
            });
    }

    function gerarNumerosAleatorios() {
        const qtd = parseInt(document.getElementById('qtdCompra').value);
        if (qtd < 1) {
            alert('Quantidade inválida');
            return;
        }
        
        fetch('/api/gerar-numeros', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ rifa_id: rifaAtual.id, quantidade: qtd })
        })
        .then(res => res.json())
        .then(data => {
            if (data.error) {
                alert('❌ ' + data.error);
            } else {
                numerosGerados = data.numeros;
                const container = document.getElementById('numerosContainer');
                container.innerHTML = numerosGerados.map(n => `<div class="numero-item">${n}</div>`).join('');
                document.getElementById('btnPagar').style.display = 'block';
            }
        });
    }

    function pagarComMercadoPago() {
        const nome = document.getElementById('clienteNome').value.trim();
        const email = document.getElementById('clienteEmail').value.trim();
        const telefone = document.getElementById('clienteTelefone').value.trim();
        
        if (!nome) {
            alert('Preencha seu nome');
            return;
        }
        if (!email) {
            alert('Preencha seu e-mail');
            return;
        }
        if (!telefone) {
            alert('Preencha seu telefone');
            return;
        }
        if (numerosGerados.length === 0) {
            alert('Gere os números primeiro');
            return;
        }
        
        const valorTotal = numerosGerados.length * rifaAtual.valor_bilhete;
        
        // Botão desabilitado com loading
        const btn = document.getElementById('btnPagar');
        const originalText = btn.innerText;
        btn.disabled = true;
        btn.innerHTML = '<span class="loading"></span> Processando...';
        
        fetch('/api/criar-preferencia', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                rifa_id: rifaAtual.id,
                numeros: numerosGerados,
                nome_cliente: nome,
                email_cliente: email,
                telefone: telefone,
                valor_total: valorTotal
            })
        })
        .then(res => res.json())
        .then(data => {
            if (data.error) {
                alert('Erro: ' + data.error);
                btn.disabled = false;
                btn.innerHTML = originalText;
            } else {
                // Redirecionar para o checkout do Mercado Pago
                window.location.href = data.init_point;
            }
        })
        .catch(err => {
            alert('Erro ao processar pagamento');
            btn.disabled = false;
            btn.innerHTML = originalText;
        });
    }

    function fecharModal() {
        document.getElementById('modalCompra').style.display = 'none';
    }

    window.onclick = function(event) {
        const modal = document.getElementById('modalCompra');
        if (event.target === modal) {
            modal.style.display = 'none';
        }
    }

    carregarRifas();
</script>
</body>
</html>
