<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RifaPro - Compre sua Rifa</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 2rem; }
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .rifa-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .rifa-card:hover { transform: translateY(-5px); }
        .rifa-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .rifa-info { padding: 15px; }
        .rifa-info h3 { margin-bottom: 10px; }
        .preco { font-size: 1.3rem; color: #48bb78; font-weight: bold; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 90%;
            overflow-y: auto;
        }
        .numero-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        .numero-item {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .btn-success { background: #48bb78; }
        .btn-pix { background: #32BCAD; }
        .btn-whatsapp { 
            background: #25D366; 
            margin-top: 5px;
        }
        .btn-whatsapp:hover { background: #128C7E; }
        .close-modal {
            float: right;
            font-size: 28px;
            cursor: pointer;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { font-weight: 600; display: block; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .pix-area {
            text-align: center;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin: 15px 0;
        }
        .pix-area img { max-width: 200px; margin: 10px auto; }
        .pix-codigo {
            background: #e9ecef;
            padding: 12px;
            border-radius: 10px;
            font-size: 11px;
            word-break: break-all;
            font-family: monospace;
            margin: 10px 0;
            cursor: pointer;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2rem;
        }
        .voltar-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .voltar-btn:hover { background: rgba(255,255,255,0.3); }
        .whatsapp-fixo {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: #25D366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.3s;
            z-index: 1000;
        }
        .whatsapp-fixo:hover {
            transform: scale(1.1);
        }
        .whatsapp-fixo img {
            width: 35px;
            height: 35px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎟️ RifaPro</h1>
        <p id="descricaoHeader">Garanta seus números</p>
    </div>

    <div id="voltarDiv" style="display: none;">
        <button class="voltar-btn" onclick="voltarParaLista()">← Voltar para todas as rifas</button>
    </div>

    <div class="card">
        <div id="rifasList" class="grid">
            <div class="loading">Carregando rifas...</div>
        </div>
    </div>
</div>

<!-- Botão WhatsApp Flutuante -->
<div class="whatsapp-fixo" onclick="abrirWhatsApp()">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" width="30" height="30" fill="white">
        <path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.4 17.7 68.9 27 106.1 27h.1c122.3 0 224.1-99.6 224.1-222 0-59.3-25.2-115-67.1-157zm-157 341.6c-33.2 0-65.7-8.9-94-25.7l-6.7-4-69.8 18.3L72 359.2l-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.6-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 56.2 81.2 56.1 130.5 0 101.8-84.9 184.6-186.6 184.6zm101.2-138.2c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-32.6-16.3-54-29.1-75.5-66-5.7-9.8 5.7-9.1 16.3-30.3 1.8-3.7.9-6.9-.5-9.7-1.4-2.8-12.5-30.2-17.1-41.4-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 35.2 15.2 49 16.5 66.1 13.9 10.9-1.6 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.6z"/>
    </svg>
</div>

<!-- Modal de Compra -->
<div id="modalCompra" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="fecharModal()">&times;</span>
        <h2 id="modalTitulo"></h2>
        <p id="modalDescricao" style="color: #666; margin-bottom: 15px;"></p>
        
        <div class="form-group">
            <label>🎫 Quantos números deseja?</label>
            <input type="number" id="qtdCompra" min="1" value="1">
            <button onclick="gerarNumerosAleatorios()">🎲 Gerar Números</button>
        </div>
        
        <div id="numerosContainer" class="numero-grid"></div>
        
        <div class="form-group">
            <label>👤 Nome completo</label>
            <input type="text" id="clienteNome" placeholder="Digite seu nome">
        </div>
        <div class="form-group">
            <label>📱 Telefone (WhatsApp)</label>
            <input type="tel" id="clienteTelefone" placeholder="(88) 98859-4944">
        </div>
        
        <div id="pixArea" style="display: none;">
            <div class="pix-area">
                <p><strong>💸 Pague via PIX</strong></p>
                <p>Valor: <strong id="valorPix">R$ 0,00</strong></p>
                <img id="qrCodeImage" src="https://via.placeholder.com/200?text=QR+CODE" alt="QR Code PIX">
                <div class="pix-codigo" id="pixCopiaCola" onclick="copiarPix()">
                    Clique aqui para copiar o código PIX
                </div>
                <button onclick="copiarPix()" class="btn-pix">📋 Copiar Código PIX</button>
                <button id="btnWhatsappCompra" class="btn-whatsapp" style="display: none;" onclick="enviarWhatsAppConfirmacao()">📱 Enviar comprovante no WhatsApp</button>
                <p style="font-size: 12px; margin-top: 10px; color: #666;">✅ Após o pagamento, envie o comprovante no WhatsApp para confirmarmos seus números.</p>
            </div>
        </div>
        
        <button id="btnMostrarPix" class="btn-pix" style="display: none;" onclick="mostrarPix()">💳 Gerar PIX para Pagamento</button>
        <div id="msgCompra" style="margin-top: 15px;"></div>
    </div>
</div>

<script>
    // Configurações
    const WHATSAPP_NUMBER = "5588988594944"; // Número do administrador
    const QR_CODE_URL = "https://imgur.com/a/5M40DIH";
    const PIX_CODIGO = "00020101021126580014br.gov.bcb.pix0136415073bf-86c3-40ff-8a8a-da8aa76a94a15204000053039865802BR5917CICERO W L VIEIRA6011BREJO SANTO62070503***6304988B";

    let rifaAtual = null;
    let numerosGerados = [];
    let valorTotal = 0;
    let rifaEspecificaId = null;
    let clienteAtual = { nome: '', telefone: '' };

    function abrirWhatsApp() {
        window.open(`https://wa.me/${WHATSAPP_NUMBER}`, '_blank');
    }

    function enviarWhatsAppConfirmacao() {
        const mensagem = `Olá! Acabei de fazer um pedido na rifa "${rifaAtual.nome}".\n\n📋 Números: ${numerosGerados.join(', ')}\n💰 Valor: R$ ${valorTotal.toFixed(2)}\n👤 Nome: ${clienteAtual.nome}\n📱 Telefone: ${clienteAtual.telefone}\n\n✅ Já efetuei o pagamento via PIX. Segue comprovante em anexo.`;
        const msgEncoded = encodeURIComponent(mensagem);
        window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${msgEncoded}`, '_blank');
    }

    function getRifaIdFromURL() {
        const params = new URLSearchParams(window.location.search);
        return params.get('rifa');
    }

    async function carregarRifas() {
        const rifaId = getRifaIdFromURL();
        rifaEspecificaId = rifaId;
        
        try {
            const response = await fetch('/api/rifas');
            let rifas = await response.json();
            
            if (rifaId) {
                rifas = rifas.filter(r => r.id == rifaId);
                if (rifas.length > 0) {
                    document.getElementById('descricaoHeader').innerHTML = `🎟️ ${rifas[0].nome}`;
                    document.getElementById('voltarDiv').style.display = 'block';
                } else {
                    document.getElementById('descricaoHeader').innerHTML = 'Rifa não encontrada';
                }
            } else {
                document.getElementById('descricaoHeader').innerHTML = 'Escolha sua rifa e garanta seus números';
                document.getElementById('voltarDiv').style.display = 'none';
            }
            
            const container = document.getElementById('rifasList');
            
            if (rifas.length === 0) {
                container.innerHTML = '<p style="text-align: center; grid-column: 1/-1;">Nenhuma rifa disponível no momento.</p>';
                return;
            }
            
            container.innerHTML = rifas.map(rifa => `
                <div class="rifa-card" onclick="abrirCompra(${rifa.id})">
                    <img src="${rifa.foto || 'https://via.placeholder.com/300x200?text=Rifa'}" alt="${rifa.nome}" onerror="this.src='https://via.placeholder.com/300x200?text=Sem+Foto'">
                    <div class="rifa-info">
                        <h3>${rifa.nome}</h3>
                        <p>${rifa.descricao || ''}</p>
                        <p class="preco">R$ ${rifa.valor_bilhete.toFixed(2)}</p>
                        <p>🎫 Disponíveis: ${rifa.quantidade_numeros - (rifa.numeros_vendidos || 0)}</p>
                    </div>
                </div>
            `).join('');
        } catch (error) {
            console.error('Erro ao carregar rifas:', error);
            document.getElementById('rifasList').innerHTML = '<p style="text-align: center; color: red;">Erro ao carregar rifas. Tente novamente.</p>';
        }
    }

    function voltarParaLista() {
        window.location.href = window.location.origin;
    }

    async function abrirCompra(id) {
        const response = await fetch(`/api/rifas/${id}`);
        rifaAtual = await response.json();
        
        document.getElementById('modalTitulo').innerHTML = rifaAtual.nome;
        document.getElementById('modalDescricao').innerHTML = rifaAtual.descricao || '';
        document.getElementById('modalCompra').style.display = 'flex';
        document.getElementById('pixArea').style.display = 'none';
        document.getElementById('numerosContainer').innerHTML = '';
        document.getElementById('msgCompra').innerHTML = '';
        document.getElementById('btnMostrarPix').style.display = 'none';
        document.getElementById('clienteNome').value = '';
        document.getElementById('clienteTelefone').value = '';
        document.getElementById('qtdCompra').value = '1';
        numerosGerados = [];
        valorTotal = 0;
    }

    function fecharModal() {
        document.getElementById('modalCompra').style.display = 'none';
    }

    async function gerarNumerosAleatorios() {
        const qtd = parseInt(document.getElementById('qtdCompra').value);
        if (qtd < 1) {
            alert('Quantidade inválida');
            return;
        }
        
        const response = await fetch('/api/gerar-numeros', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ rifa_id: rifaAtual.id, quantidade: qtd })
        });
        
        const data = await response.json();
        if (data.error) {
            alert('❌ ' + data.error);
        } else {
            numerosGerados = data.numeros;
            valorTotal = numerosGerados.length * rifaAtual.valor_bilhete;
            const container = document.getElementById('numerosContainer');
            container.innerHTML = numerosGerados.map(n => `<div class="numero-item">${n}</div>`).join('');
            document.getElementById('btnMostrarPix').style.display = 'block';
        }
    }

    async function mostrarPix() {
        const nome = document.getElementById('clienteNome').value.trim();
        const telefone = document.getElementById('clienteTelefone').value.trim();
        
        if (!nome) {
            alert('Preencha seu nome');
            return;
        }
        if (!telefone) {
            alert('Preencha seu telefone');
            return;
        }
        
        clienteAtual = { nome, telefone };
        
        document.getElementById('valorPix').innerHTML = `R$ ${valorTotal.toFixed(2)}`;
        document.getElementById('qrCodeImage').src = QR_CODE_URL;
        document.getElementById('pixCopiaCola').innerHTML = PIX_CODIGO;
        document.getElementById('pixArea').style.display = 'block';
        document.getElementById('btnMostrarPix').style.display = 'none';
        document.getElementById('btnWhatsappCompra').style.display = 'block';
        
        document.getElementById('msgCompra').innerHTML = `
            <div style="background:#e6ffe6; padding:15px; border-radius:10px; margin-top:10px;">
                ✅ <strong>Números reservados! Aguardando pagamento.</strong><br>
                🎫 Números: ${numerosGerados.join(', ')}<br>
                💰 Valor: R$ ${valorTotal.toFixed(2)}<br>
                📱 Após pagar, clique no botão WhatsApp para enviar o comprovante.
            </div>
        `;
        
        await fetch('/api/reservar-numeros', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                rifa_id: rifaAtual.id,
                numeros: numerosGerados,
                nome_cliente: nome,
                telefone: telefone
            })
        });
    }

    function copiarPix() {
        navigator.clipboard.writeText(PIX_CODIGO);
        alert('✅ Código PIX copiado!');
    }

    window.onclick = function(event) {
        const modal = document.getElementById('modalCompra');
        if (event.target === modal) {
            modal.style.display = 'none';
        }
    }

    carregarRifas();
</script>
</body>
</html>
