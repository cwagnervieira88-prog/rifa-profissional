<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprar Rifas - RifaPro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 2rem; }
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .rifa-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .rifa-card:hover { transform: translateY(-5px); }
        .rifa-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .rifa-info { padding: 15px; }
        .rifa-info h3 { margin-bottom: 10px; }
        .preco { font-size: 1.3rem; color: #48bb78; font-weight: bold; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 90%;
            overflow-y: auto;
        }
        .numero-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        .numero-item {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
        }
        .qrcode { text-align: center; margin: 20px 0; }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .btn-success { background: #48bb78; }
        .close-modal {
            float: right;
            font-size: 28px;
            cursor: pointer;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { font-weight: 600; display: block; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎟️ Escolha sua Rifa</h1>
        <p>Clique na rifa desejada e garanta seus números</p>
    </div>

    <div class="card">
        <div id="rifasList" class="grid">
            <p style="text-align: center; grid-column: 1/-1;">Carregando rifas...</p>
        </div>
    </div>
</div>

<!-- Modal de Compra -->
<div id="modalCompra" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="fecharModal()">&times;</span>
        <h2 id="modalTitulo"></h2>
        <p id="modalDescricao" style="color: #666; margin-bottom: 15px;"></p>
        <div class="form-group">
            <label>🎫 Quantos números deseja?</label>
            <input type="number" id="qtdCompra" min="1" value="1">
            <button onclick="gerarNumerosAleatorios()">🎲 Gerar Números Aleatórios</button>
        </div>
        <div id="numerosContainer" class="numero-grid"></div>
        <div class="form-group">
            <label>👤 Seu nome completo</label>
            <input type="text" id="clienteNome" placeholder="Digite seu nome">
        </div>
        <div class="form-group">
            <label>📱 Seu telefone (WhatsApp)</label>
            <input type="tel" id="clienteTelefone" placeholder="(11) 99999-9999">
        </div>
        <div id="pixInfo" style="display: none;">
            <hr style="margin: 15px 0;">
            <h3>💸 Pagar via PIX</h3>
            <div class="qrcode" id="qrCodeArea"></div>
            <textarea id="pixCopiaCola" rows="2" readonly style="width:100%; font-size:12px; padding:8px;"></textarea>
            <button onclick="copiarPix()">📋 Copiar Código PIX</button>
        </div>
        <button onclick="finalizarCompra()" class="btn-success">💳 Confirmar e Gerar PIX</button>
        <div id="msgCompra" style="margin-top: 15px;"></div>
    </div>
</div>

<script>
    let rifaAtual = null;
    let numerosGerados = [];

    function carregarRifas() {
        fetch('/api/rifas')
            .then(res => res.json())
            .then(rifas => {
                const container = document.getElementById('rifasList');
                if (rifas.length === 0) {
                    container.innerHTML = '<p style="text-align: center; grid-column: 1/-1;">Nenhuma rifa disponível no momento.</p>';
                    return;
                }
                container.innerHTML = rifas.map(rifa => `
                    <div class="rifa-card" onclick="abrirCompra(${rifa.id})">
                        <img src="${rifa.foto || 'https://via.placeholder.com/300x200?text=Rifa'}" alt="${rifa.nome}" onerror="this.src='https://via.placeholder.com/300x200?text=Sem+Foto'">
                        <div class="rifa-info">
                            <h3>${rifa.nome}</h3>
                            <p>${rifa.descricao || ''}</p>
                            <p class="preco">R$ ${rifa.valor_bilhete.toFixed(2)}</p>
                            <p>🎫 Disponíveis: ${rifa.quantidade_numeros - (rifa.numeros_vendidos || 0)}</p>
                        </div>
                    </div>
                `).join('');
            });
    }

    function abrirCompra(id) {
        fetch(`/api/rifas/${id}`)
            .then(res => res.json())
            .then(rifa => {
                rifaAtual = rifa;
                document.getElementById('modalTitulo').innerHTML = rifa.nome;
                document.getElementById('modalDescricao').innerHTML = rifa.descricao || '';
                document.getElementById('modalCompra').style.display = 'flex';
                document.getElementById('pixInfo').style.display = 'none';
                document.getElementById('numerosContainer').innerHTML = '';
                document.getElementById('msgCompra').innerHTML = '';
                document.getElementById('clienteNome').value = '';
                document.getElementById('clienteTelefone').value = '';
                document.getElementById('qtdCompra').value = '1';
                numerosGerados = [];
            });
    }

    function gerarNumerosAleatorios() {
        const qtd = parseInt(document.getElementById('qtdCompra').value);
        if (qtd < 1) {
            alert('Quantidade inválida');
            return;
        }
        
        fetch('/api/gerar-numeros', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ rifa_id: rifaAtual.id, quantidade: qtd })
        })
        .then(res => res.json())
        .then(data => {
            if (data.error) {
                alert('❌ ' + data.error);
            } else {
                numerosGerados = data.numeros;
                const container = document.getElementById('numerosContainer');
                container.innerHTML = numerosGerados.map(n => `<div class="numero-item">${n}</div>`).join('');
            }
        });
    }

    function finalizarCompra() {
        const nome = document.getElementById('clienteNome').value.trim();
        const telefone = document.getElementById('clienteTelefone').value.trim();
        
        if (!nome) {
            alert('Preencha seu nome');
            return;
        }
        if (!telefone) {
            alert('Preencha seu telefone');
            return;
        }
        if (numerosGerados.length === 0) {
            alert('Gere os números primeiro');
            return;
        }
        
        const valorTotal = numerosGerados.length * rifaAtual.valor_bilhete;
        
        fetch('/api/pagamento/pix', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                rifa_id: rifaAtual.id,
                numeros: numerosGerados,
                nome_cliente: nome,
                telefone: telefone,
                valor_total: valorTotal
            })
        })
        .then(res => res.json())
        .then(pagamento => {
            document.getElementById('pixInfo').style.display = 'block';
            document.getElementById('qrCodeArea').innerHTML = `<img src="${pagamento.qr_code}" style="width:180px; border:1px solid #ddd; padding:10px; border-radius:10px;">`;
            document.getElementById('pixCopiaCola').value = pagamento.pix_copia_cola;
            document.getElementById('msgCompra').innerHTML = `
                <div style="background:#e6ffe6; padding:15px; border-radius:10px; margin-top:10px;">
                    ✅ <strong>Números reservados!</strong><br>
                    🎫 Números: ${numerosGerados.join(', ')}<br>
                    💰 Valor: R$ ${valorTotal.toFixed(2)}<br>
                    📱 Efetue o pagamento via PIX acima para confirmar
                </div>
            `;
            
            // Atualizar lista após confirmação
            setTimeout(() => {
                carregarRifas();
            }, 3000);
        });
    }

    function copiarPix() {
        const texto = document.getElementById('pixCopiaCola').value;
        navigator.clipboard.writeText(texto);
        alert('✅ Código PIX copiado!');
    }

    function fecharModal() {
        document.getElementById('modalCompra').style.display = 'none';
    }

    window.onclick = function(event) {
        const modal = document.getElementById('modalCompra');
        if (event.target === modal) {
            modal.style.display = 'none';
        }
    }

    carregarRifas();
</script>
</body>
</html>
